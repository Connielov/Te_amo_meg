<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connie & Megan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%;
    background: radial-gradient(ellipse at 50% 20%, #1a0b2e 0%, #0a0414 55%, #050208 100%);
    overflow-x:hidden;
    font-family:'Quicksand', sans-serif;
  }

  body {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 16px;
    position:relative;
  }

  .stars {
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #ffffff55, transparent),
      radial-gradient(1px 1px at 80% 10%, #ffffff44, transparent),
      radial-gradient(1px 1px at 60% 70%, #ffffff33, transparent),
      radial-gradient(1.5px 1.5px at 30% 85%, #ffffff55, transparent),
      radial-gradient(1px 1px at 90% 60%, #ffffff33, transparent),
      radial-gradient(1.5px 1.5px at 45% 40%, #ffffff44, transparent),
      radial-gradient(1px 1px at 15% 55%, #ffffff33, transparent),
      radial-gradient(1px 1px at 70% 90%, #ffffff44, transparent);
    background-repeat:no-repeat;
    z-index:0;
  }

  .title {
    font-family:'Pacifico', cursive;
    font-size:clamp(28px, 5vw, 46px);
    text-align:center;
    color:#fff;
    letter-spacing:1px;
    z-index:2;
    margin-bottom:18px;
    text-shadow:
      0 0 6px #ff2fd0,
      0 0 16px #b400ff;
  }

  .stage {
    position:relative;
    width:min(560px, 92vw);
    aspect-ratio: 1 / 1;
    z-index:2;
  }

  .stage svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }

  .heart-path {
    fill:rgba(255,20,147,0.04);
    stroke:#ff2fd0;
    stroke-width:5;
    stroke-linejoin:round;
    filter:
      drop-shadow(0 0 5px #ff2fd0)
      drop-shadow(0 0 18px #b400ff);
  }

  .critter {
    position:absolute;
    top:38%;
    transform:translateY(-50%);
    filter: drop-shadow(0 0 8px currentColor);
    will-change: transform;
  }

  .connie-img {
    left:16%;
    width:30%;
    color:#ff1744;
    animation: bob 4s ease-in-out infinite;
  }

  .megan-img {
    right:16%;
    width:30%;
    color:#22d3ff;
    animation: bob 4.6s ease-in-out infinite reverse;
  }

  @keyframes bob {
    0%,100% { transform: translateY(-50%); }
    50% { transform: translateY(calc(-50% - 6px)); }
  }

  .message {
    z-index:2;
    text-align:center;
    margin-top:6px;
    font-family:'Pacifico', cursive;
    font-size:clamp(20px, 4.2vw, 34px);
    color:#fff;
    line-height:1.5;
    text-shadow:
      0 0 6px #fff,
      0 0 18px #ff2fd0;
  }

  .names {
    z-index:2;
    display:flex;
    gap:40px;
    margin-top:14px;
    font-weight:700;
    letter-spacing:2px;
    font-size:15px;
  }
  .names span:first-child { color:#ff5c7a; text-shadow:0 0 6px #ff1744; }
  .names span:last-child { color:#5ee7ff; text-shadow:0 0 6px #22d3ff; }

  .heart-particle {
    position:fixed;
    bottom:-30px;
    font-size:16px;
    opacity:0.8;
    animation: rise linear infinite;
    z-index:1;
    pointer-events:none;
    will-change: transform, opacity;
  }
  @keyframes rise {
    to { transform: translateY(-110vh); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce) {
    .critter, .heart-particle { animation: none !important; }
  }
</style>
</head>

<div class="stars"></div>

<p class="message">Te amo, Amor.<br>Estoy Aqui 💕</p>

<div class="names">
  <span>CONNIE</span>
  <span>MEGAN</span>
</div>

<script>
  // Lightweight ambient hearts - capped count, low frequency
  const emojis = ['💗','💙','✨'];
  let active = 0;
  const MAX_ACTIVE = 6;

  function spawnHeart() {
    if (active >= MAX_ACTIVE) return;
    active++;
    const el = document.createElement('div');
    el.className = 'heart-particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.animationDuration = (7 + Math.random()*5) + 's';
    el.style.fontSize = (14 + Math.random()*10) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => { el.remove(); active--; });
  }
  setInterval(spawnHeart, 1600);
</script>
